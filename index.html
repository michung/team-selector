<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>9-a-Side Team Selector</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>⚽ Team Selector</h1>
            <div class="mode-tabs">
                <button id="plan-mode-btn" class="tab-btn active">📋 Plan</button>
                <button id="live-mode-btn" class="tab-btn">⏱️ Live</button>
            </div>
        </header>
        
        <section class="live-controls" id="live-controls" style="display: none;">
            <div class="score-display">
                <div class="score-team">
                    <span class="team-label">Us</span>
                    <span class="score" id="score-us">0</span>
                </div>
                <span class="score-divider">-</span>
                <div class="score-team">
                    <span class="team-label">Them</span>
                    <span class="score" id="score-them">0</span>
                </div>
            </div>
            <div class="score-buttons">
                <button id="them-goal-btn" class="btn btn-small btn-secondary">+1 Them</button>
                <button id="undo-goal-btn" class="btn btn-small btn-danger">Undo</button>
            </div>
            <div class="timer-display">
                <span id="current-time">00:00</span>
            </div>
            <div class="timer-buttons">
                <button id="start-btn" class="btn btn-primary">▶ Start</button>
                <button id="pause-btn" class="btn btn-secondary" disabled>⏸ Pause</button>
            </div>
            <p class="live-hint">Hold player to record a goal</p>
        </section>
        
        <section class="plan-controls" id="plan-controls">
            <div class="interval-tabs" id="interval-tabs">
                <!-- Generated by JS -->
            </div>
            <p class="plan-hint">Drag players to plan substitutions for each interval</p>
        </section>

        <main class="pitch-container">
            <div class="pitch" id="pitch">
                <div class="pitch-markings">
                    <div class="center-circle"></div>
                    <div class="center-line"></div>
                    <div class="penalty-area top"></div>
                    <div class="penalty-area bottom"></div>
                </div>
                
                <div class="position-slots formation-3-4-1" id="position-slots">
                    <!-- Formation: 3-4-1 -->
                    
                    <!-- Forward (1) -->
                    <div class="position-slot" data-position="FW" data-row="3">
                        <span class="position-label">FW</span>
                        <div class="player-slot" data-slot="8"></div>
                    </div>
                    
                    <!-- Midfielders (4): LW, CM, CM, RW -->
                    <div class="position-slot" data-position="LW" data-row="2">
                        <span class="position-label">LW</span>
                        <div class="player-slot" data-slot="4"></div>
                    </div>
                    <div class="position-slot" data-position="LCM" data-row="2">
                        <span class="position-label">CM</span>
                        <div class="player-slot" data-slot="5"></div>
                    </div>
                    <div class="position-slot" data-position="RCM" data-row="2">
                        <span class="position-label">CM</span>
                        <div class="player-slot" data-slot="6"></div>
                    </div>
                    <div class="position-slot" data-position="RW" data-row="2">
                        <span class="position-label">RW</span>
                        <div class="player-slot" data-slot="7"></div>
                    </div>
                    
                    <!-- Defenders (3) -->
                    <div class="position-slot" data-position="LB" data-row="1">
                        <span class="position-label">LB</span>
                        <div class="player-slot" data-slot="1"></div>
                    </div>
                    <div class="position-slot" data-position="CB" data-row="1">
                        <span class="position-label">CB</span>
                        <div class="player-slot" data-slot="2"></div>
                    </div>
                    <div class="position-slot" data-position="RB" data-row="1">
                        <span class="position-label">RB</span>
                        <div class="player-slot" data-slot="3"></div>
                    </div>
                    
                    <!-- Goalkeeper -->
                    <div class="position-slot" data-position="GK" data-row="0">
                        <span class="position-label">GK</span>
                        <div class="player-slot" data-slot="0"></div>
                    </div>
                </div>
            </div>
        </main>

        <section class="bench-section">
            <h2>📋 Substitutes Bench</h2>
            <div class="bench" id="bench">
                <!-- Substitute players will be added here -->
            </div>
        </section>

        <section class="stats-section" id="stats-section">
            <h2 id="stats-heading">📊 Planned Minutes</h2>
            <div class="stats-table" id="stats-table">
                <!-- Stats will be generated here -->
            </div>
        </section>

        <section class="events-section" id="events-section" style="display: none;">
            <h2>📋 Match Events</h2>
            <div class="events-log" id="events-log">
                <!-- Match events will be added here -->
            </div>
        </section>

        <section class="settings-panel" id="settings-panel">
            <h2>Match Settings</h2>
            <div class="setting-row">
                <label for="match-duration">Match Duration (mins)</label>
                <input type="number" id="match-duration" value="60" min="10" max="120">
            </div>
            <button id="toggle-settings" class="btn btn-small">⚙️ Settings</button>
            <button id="reset-match" class="btn btn-danger btn-small">🔄 Reset Match</button>
        </section>

        <section class="roster-section collapsed" id="roster-section">
            <h2 class="collapsible-header" id="roster-toggle">👥 Squad Management <span class="toggle-icon">▶</span></h2>
            <div class="collapsible-content" id="roster-content">
                <div class="roster-controls">
                    <input type="text" id="new-player-name" placeholder="Enter player name">
                    <button id="add-player-btn" class="btn btn-primary">+ Add Player</button>
                </div>
                <div class="roster-list" id="roster-list">
                    <!-- Roster will be generated here -->
                </div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>9-a-Side Team Selector</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>⚽ Team Selector</h1>
            <div class="header-controls">
                <div class="mode-tabs">
                    <button id="plan-mode-btn" class="tab-btn active">📋 Plan</button>
                    <button id="live-mode-btn" class="tab-btn">⏱️ Live</button>
                </div>
                <button id="share-plan-btn" class="btn btn-small btn-share">📤 Share</button>
                <div class="timer-buttons" id="timer-buttons" style="display: none;">
                    <button id="start-btn" class="btn btn-small btn-primary">▶</button>
                    <button id="pause-btn" class="btn btn-small btn-secondary" disabled>⏸</button>
                </div>
            </div>
        </header>
        
        <section class="live-controls" id="live-controls" style="display: none;">
            <div class="live-hint-overlay" id="live-hint-overlay">
                <div class="hint-card">
                    <div class="hint-item">👆 Hold player for goal</div>
                    <div class="hint-item">👈 Tap opposition score</div>
                    <div class="hint-dismiss">tap to dismiss</div>
                </div>
            </div>
            <div class="score-display">
                <div class="score-team">
                    <span class="team-label">Us</span>
                    <span class="score" id="score-us">0</span>
                </div>
                <span class="score-divider">-</span>
                <div class="score-team score-them-tap" id="score-them-team">
                    <span class="team-label">Them</span>
                    <span class="score" id="score-them">0</span>
                </div>
            </div>
            <div class="timer-display">
                <span id="current-time">00:00</span>
            </div>
        </section>
        
        <section class="plan-controls" id="plan-controls">
            <div class="interval-config">
                <label>Intervals:</label>
                <div class="stepper">
                    <button id="interval-dec" class="stepper-btn">−</button>
                    <span id="interval-count" class="stepper-value">4</span>
                    <button id="interval-inc" class="stepper-btn">+</button>
                </div>
                <label>Subs:</label>
                <div class="stepper">
                    <button id="subs-dec" class="stepper-btn">−</button>
                    <span id="subs-count" class="stepper-value">Auto</span>
                    <button id="subs-inc" class="stepper-btn">+</button>
                </div>
                <button id="auto-subs-btn" class="btn btn-small btn-primary">Auto</button>
            </div>
            <div class="interval-tabs" id="interval-tabs">
                <!-- Generated by JS -->
            </div>
            <p class="plan-hint">Drag players to plan subs · Drag interval to copy lineups</p>
        </section>

        <main class="pitch-container">
            <div class="pitch" id="pitch">
                <div class="pitch-markings">
                    <div class="center-circle"></div>
                    <div class="center-line"></div>
                    <div class="penalty-area top"></div>
                    <div class="penalty-area bottom"></div>
                </div>
                
                <div class="position-slots formation-3-4-1" id="position-slots">
                    <!-- Formation: 3-4-1 -->
                    
                    <!-- Forward (1) -->
                    <div class="position-slot" data-position="FW" data-row="3">
                        <span class="position-label">FW</span>
                        <div class="player-slot" data-slot="8"></div>
                    </div>
                    
                    <!-- Midfielders (4): LW, CM, CM, RW -->
                    <div class="position-slot" data-position="LW" data-row="2">
                        <span class="position-label">LW</span>
                        <div class="player-slot" data-slot="4"></div>
                    </div>
                    <div class="position-slot" data-position="LCM" data-row="2">
                        <span class="position-label">CM</span>
                        <div class="player-slot" data-slot="5"></div>
                    </div>
                    <div class="position-slot" data-position="RCM" data-row="2">
                        <span class="position-label">CM</span>
                        <div class="player-slot" data-slot="6"></div>
                    </div>
                    <div class="position-slot" data-position="RW" data-row="2">
                        <span class="position-label">RW</span>
                        <div class="player-slot" data-slot="7"></div>
                    </div>
                    
                    <!-- Defenders (3) -->
                    <div class="position-slot" data-position="LB" data-row="1">
                        <span class="position-label">LB</span>
                        <div class="player-slot" data-slot="1"></div>
                    </div>
                    <div class="position-slot" data-position="CB" data-row="1">
                        <span class="position-label">CB</span>
                        <div class="player-slot" data-slot="2"></div>
                    </div>
                    <div class="position-slot" data-position="RB" data-row="1">
                        <span class="position-label">RB</span>
                        <div class="player-slot" data-slot="3"></div>
                    </div>
                    
                    <!-- Goalkeeper -->
                    <div class="position-slot" data-position="GK" data-row="0">
                        <span class="position-label">GK</span>
                        <div class="player-slot" data-slot="0"></div>
                    </div>
                </div>
            </div>
        </main>

        <section class="bench-section">
            <div class="bench" id="bench">
                <!-- Substitute players will be added here -->
            </div>
        </section>

        <section class="stats-section" id="stats-section">
            <h2 id="stats-heading">📊 Planned Minutes</h2>
            <div class="subs-summary" id="subs-summary">
                <!-- Substitution summary will be generated here -->
            </div>
            <div class="stats-table" id="stats-table">
                <!-- Stats will be generated here -->
            </div>
        </section>

        <section class="events-section" id="events-section" style="display: none;">
            <h2>📋 Match Events</h2>
            <div class="events-log" id="events-log">
                <!-- Match events will be added here -->
            </div>
        </section>

        <section class="settings-panel" id="settings-panel">
            <div class="settings-buttons">
                <button id="toggle-settings" class="btn btn-small">⚙️ Settings</button>
                <button id="toggle-squad" class="btn btn-small">👥 Squad</button>
                <button id="reset-match" class="btn btn-danger btn-small">🔄 Reset</button>
            </div>
            <div class="settings-content" id="settings-content" style="display: none;">
                <div class="setting-row">
                    <label for="match-duration">Match Duration (mins)</label>
                    <input type="number" id="match-duration" value="60" min="10" max="120">
                </div>
            </div>
            <div class="squad-content" id="squad-content" style="display: none;">
                <div class="roster-controls">
                    <input type="text" id="new-player-name" placeholder="Player name">
                    <button id="add-player-btn" class="btn btn-small btn-primary">+ Add</button>
                </div>
                <div class="roster-list" id="roster-list">
                    <!-- Roster will be generated here -->
                </div>
            </div>
        </section>
    </div>

    <!-- Assist Picker Overlay -->
    <div class="assist-picker-overlay" id="assist-picker" style="display: none;">
        <div class="assist-picker-content">
            <h3>Who assisted?</h3>
            <div class="assist-options" id="assist-options">
                <!-- Player buttons generated by JS -->
            </div>
            <button class="btn btn-secondary assist-skip" id="no-assist-btn">No Assist</button>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
